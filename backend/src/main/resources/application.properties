spring.application.name=focuseye

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
# Prod: set SPRING_DATASOURCE_URL to your Neon connection string, e.g.
#   jdbc:postgresql://ep-xxx-pooler.us-east-2.aws.neon.tech/focuseye?sslmode=require
# Local dev falls back to a file-backed H2 instance under backend/.data/.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./.data/focuseyedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# Hibernate auto-detects the dialect from the JDBC URL.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Neon auto-suspends idle compute; tune Hikari so we don't sit on dead sockets.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=15000

# ---------------------------------------------------------------------------
# AI subprocess
# ---------------------------------------------------------------------------
ai.python.executable=${AI_PYTHON_EXECUTABLE:../ai/venv/bin/python}
ai.predict.script=${AI_PREDICT_SCRIPT:../ai/predict.py}

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
# Comma-separated list of allowed origins (supports patterns like https://*.vercel.app).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=${PORT:8080}
server.address=0.0.0.0
