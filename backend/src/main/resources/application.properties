spring.datasource.url=jdbc:postgresql://${RDS_HOST}:5432/postgres?ssl=true&sslmode=require
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${RDS_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Deployment-ready AI paths (matching Dockerfile ENV)
ai.python.executable=${AI_PYTHON_EXECUTABLE:../ai/venv/bin/python}
ai.predict.script=${AI_PREDICT_SCRIPT:../ai/predict.py}

# CORS Configuration for deployment
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

server.port=${PORT:8080}
