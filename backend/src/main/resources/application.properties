spring.application.name=focuseye

# Run each request on a virtual thread (Java 21+, stable). Our work is almost
# entirely I/O (Postgres + polling), so requests spend most of their time
# blocked — exactly the case virtual threads make cheap. Java 24's JEP 491 also
# removed the old "synchronized pins the carrier thread" pitfall that Spring,
# Hibernate and Hikari would otherwise hit. Safe to remove this one line if you
# ever want to fall back to the classic platform-thread pool.
spring.threads.virtual.enabled=true

# ---------------------------------------------------------------------------
# Database (Neon Postgres)
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate auto-detects the dialect from the JDBC URL.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Neon auto-suspends idle compute (scale-to-zero) after a short window of no
# active connections. We want that suspend to actually happen when nobody is
# using the app, so the pool must fully drain when idle:
#   - minimum-idle=0     -> Hikari keeps NO connection open when idle, so there
#                           is nothing holding Neon's compute awake. The pool
#                           grows on demand up to maximum-pool-size.
#   - idle-timeout=30s   -> idle connections are retired quickly (well under
#                           Neon's autosuspend window) so the pool reaches 0.
#   - keepalive is left OFF on purpose; a keepalive ping would defeat suspend.
# First request after a suspend pays a cold-wake (~1s); connection-timeout=15s
# accommodates it.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=15000

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
# Comma-separated list of allowed origins (supports patterns like https://*.vercel.app).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=${PORT:8080}
server.address=0.0.0.0
