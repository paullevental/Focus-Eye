spring.application.name=focuseye

# ---------------------------------------------------------------------------
# Database (Neon Postgres)
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate auto-detects the dialect from the JDBC URL.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Neon auto-suspends idle compute; tune Hikari so we don't sit on dead sockets.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=15000

# ---------------------------------------------------------------------------
# AI subprocess
# ---------------------------------------------------------------------------
ai.python.executable=${AI_PYTHON_EXECUTABLE:../ai/venv/bin/python}
ai.predict.script=${AI_PREDICT_SCRIPT:../ai/predict.py}

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
# Comma-separated list of allowed origins (supports patterns like https://*.vercel.app).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=${PORT:8080}
server.address=0.0.0.0
