spring.application.name=focuseye-test

# Test-only datasource: in-memory H2, fresh schema per test run.
# The main src/main/resources/application.properties requires real
# SPRING_DATASOURCE_* env vars; this file overrides them for tests so
# `mvn test` / `mvn package` can boot the Spring context without Neon.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Stubs for @Value-injected beans so the context loads cleanly.
ai.python.executable=python3
ai.predict.script=predict.py
app.cors.allowed-origins=http://localhost:5173

# Random free port so parallel test runs don't collide.
server.port=0
